    <path fill="#D4A017" d="M581.5,85 H698.5 A1.5,1.5 0 0 1 700,86.5 V86.5 A1.5,1.5 0 0 1 698.5,88 H581.5 A1.5,1.5 0 0 1 580,86.5 V86.5 A1.5,1.5 0 0 1 581.5,85 Z" />

    <!-- 左栏 01 -->
