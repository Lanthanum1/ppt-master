<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F7F9FC" />
            <stop offset="100%" style="stop-color:#E8F0EC" />
        </linearGradient>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1B6B3A" />
            <stop offset="100%" style="stop-color:#2E8A50" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 左上装饰圆 -->
    <circle cx="80" cy="80" r="120" fill="#1B6B3A" opacity="0.08" />
    <circle cx="120" cy="60" r="60" fill="#1B6B3A" opacity="0.12" />

    <!-- 右下装饰圆 -->
    <circle cx="1200" cy="640" r="150" fill="#1B6B3A" opacity="0.08" />
    <circle cx="1150" cy="680" r="80" fill="#1B6B3A" opacity="0.12" />

    <!-- 顶部色条 -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#accentGradient)" />

    <!-- 中央书本图标 -->
    <g transform="translate(640, 185)">
        <path fill="#1B6B3A" opacity="0.15" d="M-56,-40 H56 A4,4 0 0 1 60,-36 V36 A4,4 0 0 1 56,40 H-56 A4,4 0 0 1 -60,36 V-36 A4,4 0 0 1 -56,-40 Z" />
        <path fill="#FFFFFF" stroke="#1B6B3A" stroke-width="2" d="M-48,-30 H48 A2,2 0 0 1 50,-28 V28 A2,2 0 0 1 48,30 H-48 A2,2 0 0 1 -50,28 V-28 A2,2 0 0 1 -48,-30 Z" />
        <line x1="-50" y1="0" x2="50" y2="0" stroke="#1B6B3A" stroke-width="1" opacity="0.3" />
        <line x1="0" y1="-30" x2="0" y2="30" stroke="#1B6B3A" stroke-width="2" />
        <rect x="-40" y="-20" width="30" height="3" fill="#1B6B3A" opacity="0.4" />
        <rect x="-40" y="-12" width="25" height="3" fill="#1B6B3A" opacity="0.3" />
        <rect x="-40" y="-4" width="28" height="3" fill="#1B6B3A" opacity="0.4" />
        <rect x="10" y="-20" width="30" height="3" fill="#1B6B3A" opacity="0.4" />
        <rect x="10" y="-12" width="25" height="3" fill="#1B6B3A" opacity="0.3" />
        <rect x="10" y="-4" width="28" height="3" fill="#1B6B3A" opacity="0.4" />
    </g>

    <!-- 主标题 -->
    <text x="640" y="322" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="52" font-weight="bold" fill="#1B6B3A">
        华中师范大学研究生学位论文
    </text>

    <!-- 副标题 -->
    <text x="640" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="32" fill="#2D3748">
        撰写格式标准及要求
    </text>

    <!-- 版本说明 -->
    <text x="640" y="442" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#718096">
        依据 GB/T 7713－1987 · GB/T 7714－2005
    </text>

    <!-- 分隔线 -->
    <path fill="url(#accentGradient)" d="M441.5,480 H838.5 A1.5,1.5 0 0 1 840,481.5 V481.5 A1.5,1.5 0 0 1 838.5,483 H441.5 A1.5,1.5 0 0 1 440,481.5 V481.5 A1.5,1.5 0 0 1 441.5,480 Z" />

    <!-- 适用说明 -->
    <text x="640" y="540" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#4A5568">
        适用于学术学位与专业学位研究生（硕士 &amp; 博士）
    </text>

    <!-- 院校标识 -->
    <text x="640" y="582" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#718096">
        Central China Normal University · CCNU
    </text>

    <!-- 页码 -->
    <text x="640" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#A0AEC0">
        1 / 11
    </text>
</svg>
