<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F7F9FC" />
            <stop offset="100%" style="stop-color:#E8F0EC" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="url(#bgGradient)" />
    <rect x="0" y="0" width="1280" height="4" fill="#1B6B3A" />

    <!-- 标题 -->
    <text x="640" y="54" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="32" font-weight="bold" fill="#1B6B3A">格式检查清单</text>
    <text x="640" y="80" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#718096">论文提交前逐项核查 · 确保规范达标</text>

    <!-- 左栏 -->
    <rect x="60" y="105" width="560" height="540" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" />
    <rect x="60" y="105" width="560" height="8" rx="5" fill="#1B6B3A" />
    <text x="340" y="141" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#1B6B3A">前置 &amp; 结构</text>

    <!-- 左栏检查项 -->
    <rect x="85" y="155" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="105" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">封面信息完整（学校、题目、作者、导师、日期）</text>

    <rect x="85" y="199" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="105" y="224" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="224" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">中英文扉页已完成</text>

    <rect x="85" y="243" width="510" height="38" rx="6" fill="#FEF9E8" stroke="#FED7A0" stroke-width="1" />
    <text x="105" y="268" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#D4A017">✓</text>
    <text x="130" y="268" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">原创性声明和授权书已亲笔签名</text>

    <rect x="85" y="287" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="105" y="312" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="312" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">中英文摘要格式符合要求</text>

    <rect x="85" y="331" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="105" y="356" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="356" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">关键词 3-8 个，分号间隔，字号同正文</text>

    <rect x="85" y="375" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="105" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">一级标题另起一页，黑体加粗居中</text>

    <rect x="85" y="419" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="105" y="444" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="444" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">目录页码格式正确（右对齐，前导符）</text>

    <rect x="85" y="463" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="105" y="488" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="488" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">摘要页码罗马数字，正文阿拉伯数字</text>

    <rect x="85" y="507" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="105" y="532" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="532" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">博士论文已采用双面印刷</text>

    <rect x="85" y="551" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="105" y="576" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="130" y="576" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">电子版已向图书馆提交（与纸质版一致）</text>

    <!-- 右栏 -->
    <rect x="660" y="105" width="560" height="540" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" />
    <rect x="660" y="105" width="560" height="8" rx="5" fill="#2E8A50" />
    <text x="940" y="141" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#2E8A50">排版 &amp; 内容</text>

    <rect x="685" y="155" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="705" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">字体字号符合规范（硕士小四/博士五号）</text>

    <rect x="685" y="199" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="705" y="224" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="224" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">行距设置正确（硕 1.25 / 博 19 磅）</text>

    <rect x="685" y="243" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="705" y="268" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="268" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">页边距设置正确（硕/博有区别）</text>

    <rect x="685" y="287" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="705" y="312" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="312" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">图表编号格式统一（图 X.X / 表 X.X）</text>

    <rect x="685" y="331" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="705" y="356" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="356" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">图题在图下，表题在表上，均居中</text>

    <rect x="685" y="375" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="705" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">公式编号在行末右侧圆括号内</text>

    <rect x="685" y="419" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="705" y="444" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="444" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">参考文献顺序编码，格式全文一致</text>

    <rect x="685" y="463" width="510" height="38" rx="6" fill="#F8FAFB" stroke="#E2E8F0" stroke-width="1" />
    <text x="705" y="488" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="488" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">注释采用脚注，每页重新编号①②③</text>

    <rect x="685" y="507" width="510" height="38" rx="6" fill="#EBF5EF" />
    <text x="705" y="532" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#1B6B3A">✓</text>
    <text x="730" y="532" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">首行均缩进两字符</text>

    <rect x="685" y="551" width="510" height="38" rx="6" fill="#FEF9E8" stroke="#FED7A0" stroke-width="1" />
    <text x="705" y="576" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#D4A017">✓</text>
    <text x="730" y="576" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#2D3748">博士：攻读期发表论著已附录</text>

    <!-- 底部提示 -->
    <rect x="60" y="658" width="1160" height="46" rx="8" fill="#1B6B3A" />
    <text x="640" y="686" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#FFFFFF">完成所有项目检查后，方可提交论文 · 祝答辩顺利！</text>
</svg>
